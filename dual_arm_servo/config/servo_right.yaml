###############################################
# MoveIt Servo 配置 - 右臂
###############################################

## 坐标系配置
planning_frame: base_link
ee_frame_name: raxis7_link
robot_link_command_frame: base_link

## 输出命令属性
publish_period: 0.01
max_expected_latency: 0.1

## 输入命令类型
command_in_type: "speed_units"
scale:
  linear: 0.2
  rotational: 0.8
  joint: 0.5

## 输出命令类型
command_out_type: trajectory_msgs/JointTrajectory

## 发布内容
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false

## 平滑滤波插件
use_smoothing: false
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## Planning Scene Monitor
# Servo 模式与 move_group 互斥运行，因此 Servo 节点自己管理 planning scene。
is_primary_planning_scene_monitor: true
check_octomap_collisions: false

## MoveIt 规划组
move_group_name: right_arm

## 奇异点和关节限制配置
lower_singularity_threshold: 200.0
hard_stop_singularity_threshold: 400.0
leaving_singularity_threshold_multiplier: 2.0
joint_limit_margins: [0.12, 0.12, 0.12, 0.12, 0.12, 0.12, 0.12]

## 话题名称
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /right_arm_controller/joint_trajectory

## 碰撞检测
check_collisions: false  # FIXME: STL meshes too large for FCL, simplify first
collision_check_rate: 10.0
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
